<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; overflow: hidden; }
    #scene { width: 100%; height: 100%; }
    #hud {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      font-family: 'Press Start 2P', monospace;
    }
    #hud > * { pointer-events: auto; }
    #header {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      background: linear-gradient(180deg, rgba(0,8,20,0.7) 0%, transparent 100%);
    }
    #header h1 {
      font-size: 16px; color: #fff; letter-spacing: 2px;
      text-shadow: 2px 2px 0 #000, 0 0 10px rgba(0,221,255,0.5);
    }
    #header .robot-count { font-size: 10px; color: #00ddff; text-shadow: 1px 1px 0 #000; }
    .hud-btn {
      border: 3px solid #fff; border-radius: 6px; color: #fff;
      font-family: 'Press Start 2P', monospace; font-size: 11px;
      padding: 8px 16px; cursor: pointer;
      text-shadow: 1px 1px 0 #000; box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .hud-btn.back { background: #555; font-size: 9px; padding: 6px 12px; }
    #mode-badge {
      position: absolute; top: 54px; left: 20px;
      font-size: 9px; padding: 4px 10px; border-radius: 4px;
      border: 2px solid #00ddff; color: #00ddff;
      background: rgba(0,8,20,0.7);
      text-shadow: 0 0 6px rgba(0,221,255,0.4);
    }
    #fuel-gauge {
      position: absolute; top: 80px; left: 20px;
      width: 160px;
    }
    #fuel-gauge .fuel-label {
      font-size: 8px; color: #00ddff; margin-bottom: 4px;
      text-shadow: 1px 1px 0 #000;
    }
    #fuel-gauge .fuel-track {
      width: 100%; height: 8px; background: rgba(0,8,20,0.8);
      border: 1px solid #00ddff; border-radius: 4px; overflow: hidden;
    }
    #fuel-gauge .fuel-fill {
      height: 100%; background: #00ddff; border-radius: 3px;
      transition: width 0.1s linear;
      box-shadow: 0 0 6px rgba(0,221,255,0.5);
    }
    #fuel-gauge .fuel-fill.low {
      background: #ff6644;
      box-shadow: 0 0 6px rgba(255,102,68,0.5);
    }
    #door-prompt {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, 60px);
      font-size: 11px; color: #00ddff; text-shadow: 1px 1px 0 #000;
      background: rgba(0,8,20,0.7); padding: 8px 16px; border-radius: 6px;
      border: 1px solid rgba(0,221,255,0.3);
      animation: promptPulse 2s ease-in-out infinite;
    }
    @keyframes promptPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    #crew-panel {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(0,8,20,0.8); border: 2px solid #00ddff;
      border-radius: 8px; padding: 10px 14px; min-width: 210px;
    }
    #crew-panel .title { font-size: 10px; color: #00ddff; margin-bottom: 8px; text-shadow: 1px 1px 0 #000; }
    #crew-panel .row {
      display: flex; align-items: center; gap: 8px; padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
    }
    #crew-panel .row:last-child { border-bottom: none; }
    #crew-panel .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #crew-panel .name {
      font-size: 9px; color: #fff; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px;
    }
    #crew-panel .status { font-size: 7px; color: #888; }
    #crew-panel .row.active { background: rgba(0,221,255,0.15); border-radius: 4px; }
    #no-robots {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; color: #fff; text-shadow: 2px 2px 0 #000;
    }
    #no-robots .big { font-size: 18px; margin-bottom: 12px; }
    #no-robots .small { font-size: 10px; color: #ccc; }
    #hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: #fff; text-shadow: 1px 1px 0 #000;
      background: rgba(0,8,20,0.6); padding: 8px 16px; border-radius: 6px;
      animation: promptPulse 2s ease-in-out infinite;
    }
    #physics-panel {
      position: absolute; top: 60px; right: 12px;
      background: rgba(0,8,20,0.85); border: 2px solid #666;
      border-radius: 8px; padding: 0; font-size: 9px; color: #ccc;
      min-width: 200px; overflow: hidden;
    }
    #physics-panel .panel-header {
      padding: 8px 12px; cursor: pointer; user-select: none;
      background: rgba(255,255,255,0.05); border-bottom: 1px solid #444;
      display: flex; justify-content: space-between; align-items: center;
    }
    #physics-panel .panel-header:hover { background: rgba(255,255,255,0.1); }
    #physics-panel .panel-body { padding: 8px 12px; }
    #physics-panel .slider-row {
      display: flex; align-items: center; gap: 6px; margin: 4px 0;
    }
    #physics-panel .slider-row label { width: 80px; font-size: 8px; text-align: right; }
    #physics-panel .slider-row input[type="range"] { flex: 1; height: 4px; }
    #physics-panel .slider-row .val { width: 36px; font-size: 8px; text-align: left; color: #00ddff; }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="hud"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="space-station.js"></script>
</body>
</html>
