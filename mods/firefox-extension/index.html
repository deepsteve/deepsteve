<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Baby Browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; }

  .url-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    background: #16213e;
    border-bottom: 1px solid #2a2a4a;
    flex-shrink: 0;
  }
  .url-bar input {
    flex: 1;
    background: #0f0f23;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 5px 8px;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    outline: none;
  }
  .url-bar input:focus { border-color: #4a4a8a; }
  .url-bar button {
    background: #2a2a4a;
    border: 1px solid #3a3a5a;
    border-radius: 4px;
    color: #e0e0e0;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 13px;
  }
  .url-bar button:hover { background: #3a3a5a; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: #16213e;
    border-bottom: 1px solid #2a2a4a;
    font-size: 11px;
    color: #888;
    flex-shrink: 0;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.ok { background: #4caf50; }
  .status-dot.missing { background: #f44336; }

  iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }
</style>
</head>
<body>
  <div class="url-bar">
    <input type="text" id="url" value="https://example.com" spellcheck="false" autocomplete="off">
    <button id="go">Go</button>
  </div>
  <div class="status-bar">
    <span class="status-dot missing" id="ext-dot"></span>
    <span id="ext-label">Checking extension...</span>
  </div>
  <iframe id="browser" sandbox="allow-same-origin allow-scripts allow-forms allow-popups" src="https://example.com"></iframe>

  <script>
    const urlInput = document.getElementById('url');
    const goBtn = document.getElementById('go');
    const frame = document.getElementById('browser');
    const extDot = document.getElementById('ext-dot');
    const extLabel = document.getElementById('ext-label');

    function navigate() {
      let url = urlInput.value.trim();
      if (!url) return;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      urlInput.value = url;
      frame.src = url;
    }

    goBtn.addEventListener('click', navigate);
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') navigate();
    });

    // Check for companion extension
    setTimeout(() => {
      if (window.deepsteveExtensionPresent) {
        extDot.classList.remove('missing');
        extDot.classList.add('ok');
        extLabel.textContent = 'Extension active';
      } else {
        extLabel.textContent = 'Extension required for most sites (strips X-Frame-Options)';
      }
    }, 500);

    // Listen for resize messages from parent
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'resize') {
        // Could be used for responsive adjustments
      }
    });
  </script>
</body>
</html>
