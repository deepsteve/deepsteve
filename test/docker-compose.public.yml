services:
  server:
    build:
      context: ..
      dockerfile: test/Dockerfile.public
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DEEPSTEVE_BIND=0.0.0.0
    healthcheck:
      # /healthz is the public readiness endpoint; /api/version is now auth-gated (#536).
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  test:
    build:
      context: ..
      dockerfile: test/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    environment:
      - DEEPSTEVE_URL=http://server:3000
    # Run files serially (one process each); skip tmux — install.sh has no tmux.
    # See test/run-integration.sh for why --test-concurrency=1 isn't enough.
    command: ["sh", "test/run-integration.sh", "tmux-engine"]
