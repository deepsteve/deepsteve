services:
  server:
    build:
      context: ..
      dockerfile: test/Dockerfile.public
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DEEPSTEVE_BIND=0.0.0.0
      # Auth (#536): the test container reaches us as http://server:3000, so allowlist that host.
      - DEEPSTEVE_ALLOW_HOST=server
      # Test mode (#562): the PUBLISHED build ignores this until a release ships #562. Until then
      # this suite is EXPECTED RED — the helpers refuse a server whose /api/version lacks
      # testMode:true, and there is deliberately no bypass. Goes green with the next release.
      - DEEPSTEVE_TEST_MODE=1
    volumes:
      # Token-only volume (#539): the app lives IN /root/.deepsteve here (unlike docker-compose.yml,
      # where it's in /app), so sharing that whole dir would risk running stale installed code from
      # a persisted volume. Instead share just the token via a neutral path; regenerated every start.
      - ds_token:/auth
    # Seed a fresh random token before the server starts: loadOrCreateToken() (security.js) reuses
    # a non-empty ~/.deepsteve/auth-token verbatim, so this is the token the server serves. The
    # healthcheck only passes after listen, so the test container always sees the final token.
    command:
      - sh
      - -c
      - |
        set -e
        node -e 'process.stdout.write(require("crypto").randomBytes(32).toString("hex"))' > /auth/token
        install -m 600 /auth/token /root/.deepsteve/auth-token
        exec node server.js
    healthcheck:
      # This suite installs the PUBLISHED deepsteve.com build, which lags source: it may predate
      # #536 (no /healthz endpoint yet) or, post-release, be #536+ (/api/version auth-gated). GET /
      # (static index.html) is served unauthenticated in EVERY version, so it's the only
      # version-robust readiness probe here. Do NOT use /healthz or /api/version in THIS file —
      # the source-built suites (docker-compose.yml / .install.yml) can, since they run current code.
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:3000/"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  test:
    build:
      context: ..
      dockerfile: test/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    environment:
      - DEEPSTEVE_URL=http://server:3000
    volumes:
      - ds_token:/auth   # read the server-seeded auth token (#539)
    # Copy the token where the test helper reads it (~/.deepsteve/auth-token), then run files
    # serially (one process each). Skips (SKIP_PATTERN is an ERE alternation):
    #   tmux-engine   — install.sh has no tmux.
    #   security-auth — this suite installs the PUBLISHED build, which lags source and may predate
    #                   #536, so its no-auth server fails the auth-contract assertions. Auth is
    #                   already covered by the source-built suites (docker-compose.yml / .install.yml).
    # See test/run-integration.sh for why --test-concurrency=1 isn't enough.
    command:
      - sh
      - -c
      - |
        set -e
        cp /auth/token /root/.deepsteve/auth-token
        exec sh test/run-integration.sh 'security-auth|tmux-engine'

volumes:
  ds_token:
